<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowPay — Your Results</title>

  <!-- ─── FAVICON ─── -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a08'/%3E%3Ccircle cx='16' cy='16' r='12' fill='none' stroke='%23c8f23a' stroke-width='2'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='14' fill='%23c8f23a' font-style='italic'%3EF%3C/text%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0a0a08; --surface:#111110; --border:#2a2a26;
      --accent:#c8f23a; --text:#e8e6df; --muted:#7a7870;
      --danger:#ff5e3a; --card-bg:#141413;
    }
    body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:0.5;
    }
    .blob { position:fixed; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(200,242,58,.06) 0%,transparent 70%); top:-200px; left:50%; transform:translateX(-50%); pointer-events:none; z-index:0; }

    /* NAV */
    nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:20px 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,.04); backdrop-filter:blur(14px); background:rgba(10,10,8,.75); }
    .logo { font-family:'Instrument Serif',serif; font-size:1.5rem; letter-spacing:-.02em; }
    .logo span { color:var(--accent); }
    .back-link { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); text-decoration:none; letter-spacing:.06em; display:flex; align-items:center; gap:6px; transition:color .2s; }
    .back-link:hover { color:var(--accent); }

    /* MAIN */
    .main { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:120px 24px 100px; }

    /* LOADING */
    .loading-state { text-align:center; padding:60px 0; }
    .loading-ring { width:56px; height:56px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 28px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-title { font-family:'Instrument Serif',serif; font-size:1.6rem; margin-bottom:8px; }
    .loading-sub { font-family:'DM Mono',monospace; font-size:.75rem; color:var(--muted); letter-spacing:.08em; }
    .loading-steps { margin-top:32px; display:flex; flex-direction:column; gap:10px; max-width:340px; margin-left:auto; margin-right:auto; }
    .load-step { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); display:flex; align-items:center; gap:10px; padding:10px 16px; border:1px solid var(--border); border-radius:6px; background:var(--card-bg); transition:all .4s; }
    .load-step.active { border-color:rgba(200,242,58,.4); color:var(--accent); }
    .load-step.done { color:#5ef295; border-color:rgba(94,242,149,.3); }
    .step-dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

    /* RESULTS HEADER */
    .results-head { margin-bottom:40px; }
    .results-eyebrow { font-family:'DM Mono',monospace; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .results-eyebrow::before { content:''; width:24px; height:1px; background:var(--accent); opacity:.5; }
    .results-title { font-family:'Instrument Serif',serif; font-size:clamp(2rem,5vw,3.2rem); letter-spacing:-.02em; line-height:1.1; margin-bottom:12px; }
    .results-title em { font-style:italic; color:var(--accent); }
    .results-meta { font-size:.88rem; color:var(--muted); line-height:1.6; }

    /* USER SUMMARY CARD */
    .your-card { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:36px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .your-label { font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .your-value { font-size:.9rem; font-weight:600; }
    .your-divider { width:1px; height:36px; background:var(--border); }

    /* RESULT CARDS */
    .result-card { background:var(--card-bg); border:1px solid var(--border); border-radius:10px; padding:22px 28px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:16px; animation:slideIn .35s ease both; transition:border-color .2s,transform .2s; }
    .result-card:hover { border-color:rgba(200,242,58,.3); transform:translateX(4px); }
    @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .card-left { display:flex; align-items:center; gap:16px; }
    .rank { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); min-width:28px; }
    .rank.top { color:var(--accent); }
    .s-name { font-size:1rem; font-weight:700; margin-bottom:3px; }
    .s-meta { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); }
    .s-handle a { color:var(--muted); text-decoration:none; }
    .s-handle a:hover { color:var(--accent); }
    .card-right { text-align:right; flex-shrink:0; }
    .mrr-badge { background:rgba(200,242,58,.1); border:1px solid rgba(200,242,58,.25); color:var(--accent); font-family:'DM Mono',monospace; font-size:.82rem; font-weight:500; padding:6px 14px; border-radius:4px; white-space:nowrap; }
    .mrr-label { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--muted); margin-top:5px; }

    /* ERROR */
    .error-state { background:rgba(255,94,58,.06); border:1px solid rgba(255,94,58,.2); border-radius:10px; padding:32px; text-align:center; }
    .error-state h3 { font-family:'Instrument Serif',serif; font-size:1.5rem; color:var(--danger); margin-bottom:8px; }
    .error-state p { font-size:.88rem; color:var(--muted); line-height:1.6; }
    .retry-btn { display:inline-flex; align-items:center; gap:8px; margin-top:20px; background:var(--accent); color:#0a0a08; font-family:'Syne',sans-serif; font-size:.85rem; font-weight:700; padding:12px 24px; border-radius:4px; text-decoration:none; }

    /* NO DATA */
    .empty-state { text-align:center; padding:60px 0; }
    .empty-state h3 { font-family:'Instrument Serif',serif; font-size:1.6rem; margin-bottom:10px; }
    .empty-state p { font-size:.88rem; color:var(--muted); max-width:400px; margin:0 auto; line-height:1.6; }

    /* SHARE */
    .share-section { margin-top:48px; padding-top:40px; border-top:1px solid var(--border); }
    .share-title { font-family:'DM Mono',monospace; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
    .share-btns { display:flex; gap:12px; flex-wrap:wrap; }
    .share-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:6px; font-family:'Syne',sans-serif; font-size:.82rem; font-weight:600; cursor:pointer; border:none; transition:all .2s; text-decoration:none; }
    .share-x { background:#000; color:#fff; }
    .share-x:hover { background:#1a1a1a; }
    .share-li { background:#0077b5; color:#fff; }
    .share-li:hover { background:#006396; }
    .share-copy { background:var(--card-bg); border:1px solid var(--border); color:var(--text); }
    .share-copy:hover { border-color:var(--accent); color:var(--accent); }

    footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:24px 40px; display:flex; align-items:center; justify-content:space-between; font-family:'DM Mono',monospace; font-size:.7rem; color:var(--muted); margin-top:80px; }
    footer a { color:var(--accent); text-decoration:none; }

    @media(max-width:640px) {
      nav{padding:16px 20px;} .main{padding:100px 16px 80px;} .result-card{flex-direction:column;align-items:flex-start;} .card-right{text-align:left;} .your-divider{display:none;}
    }
  </style>
</head>
<body>
<div class="blob"></div>

<nav>
  <div class="logo">Flow<span>Pay</span></div>
  <a href="/" class="back-link">← New search</a>
</nav>

<div class="main" id="main">
  <!-- Loading state shown initially -->
  <div class="loading-state" id="loadingState">
    <div class="loading-ring"></div>
    <div class="loading-title">Querying TrustMRR…</div>
    <div class="loading-sub">Searching $1.2B in verified revenue data</div>
    <div class="loading-steps">
      <div class="load-step active" id="step1"><div class="step-dot"></div>Decoding your submission</div>
      <div class="load-step" id="step2"><div class="step-dot"></div>Connecting to TrustMRR API</div>
      <div class="load-step" id="step3"><div class="step-dot"></div>Filtering by industry &amp; type</div>
      <div class="load-step" id="step4"><div class="step-dot"></div>Ranking results by revenue</div>
    </div>
  </div>
</div>

<footer>
  <div>© 2026 FlowPay · <a href="https://flowpay.work">flowpay.work</a></div>
  <div>Data · <a href="https://trustmrr.com" target="_blank">TrustMRR</a></div>
</footer>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────
  const TRUSTMRR_API_KEY = 'tmrr_386f2aa7096e558eeb8c38f6a23975aa';
  const TRUSTMRR_BASE    = 'https://trustmrr.com/api';

  // ─── DECODE USER TOKEN FROM URL ──────────────────────────────────────────
  function getUserData() {
    try {
      const params = new URLSearchParams(window.location.search);
      const d = params.get('d');
      if (!d) return null;
      return JSON.parse(decodeURIComponent(escape(atob(d))));
    } catch(e) { return null; }
  }

  // ─── ANIMATED LOADING STEPS ──────────────────────────────────────────────
  function animateSteps(cb) {
    const steps = ['step1','step2','step3','step4'];
    let i = 0;
    function next() {
      if (i > 0) {
        document.getElementById(steps[i-1]).classList.remove('active');
        document.getElementById(steps[i-1]).classList.add('done');
      }
      if (i < steps.length) {
        document.getElementById(steps[i]).classList.add('active');
        i++;
        setTimeout(next, 700);
      } else {
        setTimeout(cb, 300);
      }
    }
    next();
  }

  // ─── FORMAT MRR ──────────────────────────────────────────────────────────
  function fmtMrr(v) {
    if (!v) return 'Undisclosed';
    if (v >= 1000000) return `$${(v/1000000).toFixed(1)}M/mo`;
    if (v >= 1000)    return `$${(v/1000).toFixed(0)}K/mo`;
    return `$${v.toLocaleString()}/mo`;
  }

  // ─── FETCH FROM TRUSTMRR ─────────────────────────────────────────────────
  async function fetchTrustMRR(userData) {
    const params = new URLSearchParams({
      type:  userData.type || 'saas',
      sort:  'revenue',
      order: 'desc',
      limit: '8'
    });
    const res = await fetch(`${TRUSTMRR_BASE}/startups?${params}`, {
      headers: {
        'Authorization': `Bearer ${TRUSTMRR_API_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!res.ok) throw new Error(`TrustMRR ${res.status}`);
    return res.json();
  }

  // ─── FALLBACK DEMO DATA ───────────────────────────────────────────────────
  function demoData(industry) {
    const sets = {
      saas: [
        {name:'1Capture',mrr:206000,description:'Double Your Trial-to-Paid Conversion Without Making Product Changes.',handle:'RobbyFrank'},
        {name:'ConvertLabs',mrr:35000,description:'We sell a SaaS product for booking and marketing for local service businesses.',handle:'rohangilkes'},
        {name:'Speel.co',mrr:66,124,description:'Use AI to generate realistic UGC-style videos and images for ads and socials. Launched in October, went from 0 to 1M ARR in 3 months.',handle:'plausible'},
        {name:'Transistor.fm',mrr:65000,description:'Podcast hosting platform',handle:'transistorfm'},
        {name:'ShipFast',mrr:55000,description:'Next.js SaaS boilerplate',handle:'marc_louvion'},
      ],
      ecommerce: [
        {name:'Gumroad',mrr:800000,description:'Creator monetization platform',handle:'gumroad'},
        {name:'Podia',mrr:175000,description:'Online course &amp; community platform',handle:'podia'},
        {name:'Lemon Squeezy',mrr:48200,description:'SaaS billing &amp; storefronts',handle:'lmsqueezy'},
        {name:'Payhip',mrr:30000,description:'Digital downloads store',handle:'payhip'},
      ],
      app: [
        {name:'Widgetsmith',mrr:290000,description:'iOS widget customisation',handle:'widgetsmith'},
        {name:'Bear Notes',mrr:80000,description:'Markdown note-taking app',handle:'bearnotesapp'},
        {name:'Streaks',mrr:55000,description:'Habit tracker app',handle:'streaksapp'},
        {name:'Flighty',mrr:40000,description:'Flight tracking app',handle:'flightyapp'},
      ],
      marketplace: [
        {name:'Nomad List',mrr:34000,description:'Digital nomad city ratings',handle:'levelsio'},
        {name:'Remote OK',mrr:42000,description:'Remote job marketplace',handle:'levelsio'},
        {name:'Peerlist',mrr:15000,description:'Professional network for builders',handle:'peerlisthq'},
      ]
    };
    return sets[industry] || sets.saas;
  }

  // ─── RENDER RESULTS ───────────────────────────────────────────────────────
  function renderResults(startups, userData, isDemo) {
    const main = document.getElementById('main');

    const yourFields = [
      {label:'Founder', value: userData.founder || '—'},
      {label:'Website', value: userData.url ? `<a href="${userData.url}" target="_blank" style="color:var(--accent);text-decoration:none">${userData.url.replace(/^https?:\/\//,'')}</a>` : '—'},
      {label:'Industry', value: userData.industry || '—'},
      {label:'Offering', value: userData.offering || '—'},
    ].filter(f => f.value && f.value !== '—');

    const yourHtml = yourFields.map((f,i) => `
      ${i > 0 ? '<div class="your-divider"></div>' : ''}
      <div><div class="your-label">${f.label}</div><div class="your-value">${f.value}</div></div>
    `).join('');

    const cardsHtml = startups.map((s,i) => {
      const mrr  = s.mrr || s.revenue || s.monthly_revenue || 0;
      const name = s.name || s.handle || 'Unknown';
      const desc = s.description || s.tagline || s.niche || '';
      const handle = s.handle || s.twitter || '';
      return `
        <div class="result-card" style="animation-delay:${0.05+i*0.07}s">
          <div class="card-left">
            <div class="rank ${i<3?'top':''}">
              ${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}
            </div>
            <div>
              <div class="s-name">${name}</div>
              <div class="s-meta">
                ${desc}
                ${handle ? `<span class="s-handle"> · <a href="https://twitter.com/${handle}" target="_blank">@${handle}</a></span>` : ''}
              </div>
            </div>
          </div>
          <div class="card-right">
            <div class="mrr-badge">${fmtMrr(mrr)}</div>
            <div class="mrr-label">verified MRR ↑</div>
          </div>
        </div>`;
    }).join('');

    const shareText = encodeURIComponent(`Just checked FlowPay — turns out ${startups[0]?.name || 'several startups'} in my industry are already making ${fmtMrr(startups[0]?.mrr||0)} 🤯\n\nCheck where YOU stand → https://flowpay.work`);

    main.innerHTML = `
      <div class="results-head">
        <div class="results-eyebrow">Your results · ${userData.industry || 'Startup'}</div>
        <div class="results-title">Startups <em>ahead</em> of you</div>
        <p class="results-meta">Hey ${userData.founder || 'founder'}, here's who's outpacing you right now in the <strong>${userData.industry || 'startup'}</strong> space — ranked by verified monthly revenue.</p>
      </div>

      <div class="your-card">${yourHtml}</div>

      ${cardsHtml}

      ${isDemo ? `<p style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:16px;text-align:center;">⚡ Sample data — live results fetched when TrustMRR API is reachable</p>` : ''}

      <div class="share-section">
        <div class="share-title">Share your results</div>
        <div class="share-btns">
          <a class="share-btn share-x" href="https://twitter.com/intent/tweet?text=${shareText}" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Share on X
          </a>
          <a class="share-btn share-li" href="https://www.linkedin.com/sharing/share-offsite/?url=https://flowpay.work" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
            Share on LinkedIn
          </a>
          <button class="share-btn share-copy" onclick="copyLink()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span id="copyLabel">Copy link</span>
          </button>
        </div>
      </div>
    `;
  }

  function copyLink() {
    navigator.clipboard.writeText('https://flowpay.work').then(() => {
      document.getElementById('copyLabel').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('copyLabel').textContent = 'Copy link'; }, 2000);
    });
  }

  function renderError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <h3>Something went wrong</h3>
        <p>${msg}</p>
        <a href="/" class="retry-btn">← Try again</a>
      </div>`;
  }

  // ─── INIT ────────────────────────────────────────────────────────────────
  async function init() {
    const userData = getUserData();

    if (!userData) {
      // No valid token — show error
      document.getElementById('loadingState').style.display = 'none';
      renderError('No valid submission found. Please complete the form and payment at <a href="/" style="color:var(--accent)">flowpay.work</a>.');
      return;
    }

    // Animate loading steps, then fetch
    animateSteps(async () => {
      let startups, isDemo = false;
      try {
        const data = await fetchTrustMRR(userData);
        startups = Array.isArray(data) ? data : (data.startups || data.data || []);
        if (!startups.length) throw new Error('empty');
      } catch (e) {
        console.warn('TrustMRR fetch failed, using demo data:', e.message);
        startups = demoData(userData.type);
        isDemo = true;
      }
      renderResults(startups, userData, isDemo);
    });
  }

  init();
</script>
</body>
</html>
