<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#c8f23a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8f23a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8f23a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c8f23a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a08"/>

  <!-- Noise texture -->
  <rect width="1200" height="630" fill="#0a0a08" opacity="0.3" filter="url(#noise)"/>

  <!-- Glow blob -->
  <ellipse cx="600" cy="180" rx="520" ry="320" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#2a2a26" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#2a2a26" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#2a2a26" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#2a2a26" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)"/>

  <!-- Domain pill -->
  <rect x="60" y="52" width="160" height="32" rx="16" fill="#c8f23a" fill-opacity="0.12" stroke="#c8f23a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="73" font-family="'Courier New', monospace" font-size="13" fill="#c8f23a" text-anchor="middle" letter-spacing="1">flowpay.work</text>

  <!-- Main headline -->
  <text x="600" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="86" fill="#e8e6df" text-anchor="middle" letter-spacing="-2">Who's making</text>
  <text x="600" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#c8f23a" text-anchor="middle" font-style="italic" letter-spacing="-2">more than you?</text>

  <!-- Subtext -->
  <text x="600" y="432" font-family="'Courier New', monospace" font-size="19" fill="#7a7870" text-anchor="middle" letter-spacing="1">Powered by TrustMRR · $1.2B in verified startup revenue</text>

  <!-- Bottom CTA box -->
  <rect x="400" y="486" width="400" height="58" rx="6" fill="#c8f23a"/>
  <text x="600" y="522" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0a0a08" text-anchor="middle" letter-spacing="1">CHECK MY STARTUP — $2.9</text>

  <!-- Bottom bar -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#lineGrad)"/>

  <!-- Revenue ticker snippets -->
  <text x="66" y="580" font-family="'Courier New', monospace" font-size="12" fill="#2a2a26">$110K/mo · Plausible</text>
  <text x="320" y="580" font-family="'Courier New', monospace" font-size="12" fill="#2a2a26">$800K/mo · Gumroad</text>
  <text x="574" y="580" font-family="'Courier New', monospace" font-size="12" fill="#2a2a26">$2.9M/mo · ConvertKit</text>
  <text x="828" y="580" font-family="'Courier New', monospace" font-size="12" fill="#2a2a26">$430K/mo · Beehiiv</text>
  <text x="1020" y="580" font-family="'Courier New', monospace" font-size="12" fill="#2a2a26">$120K/mo · Carrd</text>
</svg>
